project:
  type: default

format:
  revealjs:
    theme: [default, custom.scss]
    slide-number: true
    chalkboard: false
    preview-links: auto
    width: 1280
    height: 720
    margin: 0.1
    min-scale: 0.2
    max-scale: 2.0
    html-math-method: mathjax
    include-in-header:
      - text: |
          <script>
          window.MathJax = {
            tex: {
              inlineMath: [['$','$'], ['\\(','\\)']],
              displayMath: [['$$','$$'], ['\\[','\\]']],
              packages: {'[+]': ['ams', 'color']}
            }
          };
          </script>
