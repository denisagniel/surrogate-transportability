# Simulation Scenarios Configuration
# This file defines the parameters for different simulation scenarios

# Binary surrogate scenario
binary_surrogate:
  n: 500
  n_classes: 2
  class_probs: [0.6, 0.4]
  treatment_effect_surrogate: [0.3, 0.7]
  treatment_effect_outcome: [0.2, 0.8]
  surrogate_type: "binary"
  outcome_type: "binary"
  covariate_effects:
    surrogate: [0.2, 0.3]
    outcome: [0.1, 0.15]
  noise_sd: 0.5
  epsilon_s: 0.1
  epsilon_y: 0.05

# Continuous surrogate scenario
continuous_surrogate:
  n: 500
  n_classes: 2
  class_probs: [0.5, 0.5]
  treatment_effect_surrogate: [0.5, 1.2]
  treatment_effect_outcome: [0.3, 0.9]
  surrogate_type: "continuous"
  outcome_type: "continuous"
  covariate_effects:
    surrogate: [0.3, 0.4]
    outcome: [0.1, 0.2]
  noise_sd: 0.5
  epsilon_s: 0.2
  epsilon_y: 0.1

# Good by innovation method, poor by traditional
good_innovation_poor_traditional:
  n: 500
  n_classes: 2
  class_probs: [0.6, 0.4]
  treatment_effect_surrogate: [0.8, 0.8]  # Strong, consistent
  treatment_effect_outcome: [0.2, 0.9]    # Varies by class
  surrogate_type: "continuous"
  outcome_type: "continuous"
  covariate_effects:
    surrogate: [0.3, 0.3]
    outcome: [0.1, 0.1]
  noise_sd: 0.5
  epsilon_s: 0.2
  epsilon_y: 0.1

# Poor by innovation method, good by traditional
poor_innovation_good_traditional:
  n: 500
  n_classes: 3
  class_probs: [0.4, 0.3, 0.3]
  treatment_effect_surrogate: [0.5, 0.1, 0.9]  # Varies by class
  treatment_effect_outcome: [0.4, 0.05, 0.8]   # Varies by class
  surrogate_type: "continuous"
  outcome_type: "continuous"
  covariate_effects:
    surrogate: [0.2, 0.2, 0.2]
    outcome: [0.1, 0.1, 0.1]
  noise_sd: 0.5
  epsilon_s: 0.2
  epsilon_y: 0.1

